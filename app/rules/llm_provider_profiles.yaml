default:
  request_timeout_seconds: 45.0
  api_family: responses
  endpoint_path: /responses
  auth_scheme: bearer
  json_mode: prompt_only
  token_parameter: max_output_tokens
  supports_system_prompt: true

providers:
  openai:
    default_model: gpt-5.4-mini
    api_family: responses
    endpoint_path: /responses
    auth_scheme: bearer
    json_mode: prompt_only
    token_parameter: max_output_tokens
    supports_web_search: true
    models:
      gpt-4.1:
        api_family: responses
        token_parameter: max_output_tokens
      gpt-4.1-mini:
        api_family: responses
        token_parameter: max_output_tokens
      gpt-5.4:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true
      gpt-5.4-mini:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true

  xai:
    default_model: grok-4-1-fast-reasoning
    api_family: responses
    endpoint_path: /responses
    auth_scheme: bearer
    json_mode: prompt_only
    token_parameter: max_output_tokens
    supports_web_search: false
    models:
      grok-4-1:
        api_family: responses
        token_parameter: max_output_tokens
      grok-4-1-fast:
        api_family: responses
        token_parameter: max_output_tokens
      grok-4-1-fast-reasoning:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true

  azure_openai:
    default_model: gpt-5.4-mini
    api_family: responses
    endpoint_path: /responses
    auth_scheme: api_key
    auth_header_name: api-key
    json_mode: prompt_only
    token_parameter: max_output_tokens
    supports_web_search: true
    models:
      gpt-4.1:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true
      gpt-4.1-mini:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true
      gpt-5.4:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true
      gpt-5.4-mini:
        api_family: responses
        token_parameter: max_output_tokens
        supports_web_search: true

  anthropic:
    default_model: claude-haiku-4-5
    api_family: messages
    endpoint_path: /messages
    auth_scheme: anthropic
    auth_header_name: x-api-key
    version_header_name: anthropic-version
    version_header_value: "2023-06-01"
    json_mode: prompt_only
    token_parameter: max_tokens
    supports_web_search: false
    models:
      claude-haiku-4-5:
        api_family: messages
        token_parameter: max_tokens
      claude-3-5-sonnet:
        api_family: messages
        token_parameter: max_tokens
      claude-sonnet-4:
        api_family: messages
        token_parameter: max_tokens
